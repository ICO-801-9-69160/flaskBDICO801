{% extends "layout.html" %} {% block container %}

<div class="group py-32 relative overflow-x-auto sm:rounded-lg">
<div class="relative bg-neutral-primary-soft max-w-xs w-full p-6 border border-default rounded-base shadow-xs mx-auto">
  
  <div class="flex flex-col items-center">
    <img class="w-24 h-24 mb-6 rounded-full" src="{{url_for('static',filename='img/usuario.png')}}" alt="Bonnie image" />
    <h5 class="mb-0.5 text-xl font-semibold tracking-tight text-heading">
      Nombre: {{maestro.nombre}} {{maestro.apellidos}}
    </h5>
     <h3 class="mb-0.5 text-xl font-semibold tracking-tight text-heading">
      Matrícula: {{maestro.matricula}} 
    </h3>
     <h3 class="mb-0.5 text-xl font-semibold tracking-tight text-heading">
      Especialidad: {{maestro.especialidad}} 
    </h3>
     <h3 class="mb-0.5 text-xl font-semibold tracking-tight text-heading">
      Correo: {{maestro.email}} 
    </h3>
    
    <div class="flex mt-4 md:mt-6 gap-4">
    <a href="/maestros" class="bg-green-500 text-white px-4 py-2 rounded flex items-center gap-2 hover:bg-green-600">
        <svg class="w-6 h-6 text-white-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12h4m-2 2v-4M4 18v-1a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v1a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1Zm8-10a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
          </svg>
        Regresar
    </a>
    </div>
  </div>
</div>
</div>
{%endblock%}
